name: Refactoring
description: Suggest a code quality, performance, or architecture improvement
labels: ["refactor"]
body:
  - type: markdown
    attributes:
      value: |
        Refactoring improves code without changing behavior. Please describe what should change and why.

        > All code changes are implemented in [hcai42/3cors-corim](https://github.com/hcai42/3cors-corim), not in this repository.

  - type: textarea
    id: description
    attributes:
      label: What Should Be Refactored and Why?
      description: Describe the current problem with the code and why it matters.
      placeholder: "The AssessmentService class is over 600 lines with mixed concerns (validation, persistence, notification). This makes it hard to test and modify safely."
    validations:
      required: true

  - type: textarea
    id: current_state
    attributes:
      label: Current State
      description: What does the code look like now? What specifically is problematic?
      placeholder: |
        - `app/services/assessment.py` is 620 lines
        - Validation, database queries, and email notifications are all in the same class
        - No unit tests exist because dependencies are tightly coupled
    validations:
      required: true

  - type: textarea
    id: desired_state
    attributes:
      label: Desired State
      description: What should it look like after refactoring?
      placeholder: |
        - Split into: AssessmentService (orchestration), AssessmentValidator, AssessmentRepository, NotificationService
        - Each module under 200 lines
        - Unit tests for each module with mocked dependencies
    validations:
      required: true

  - type: textarea
    id: affected_files
    attributes:
      label: Affected Files
      description: List the files that need changes.
      placeholder: |
        - 3cors-corim/backend/app/services/assessment.py (split)
        - 3cors-corim/backend/app/repositories/assessment.py (extract)
        - 3cors-corim/backend/tests/ (add unit tests)
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How to verify the refactoring is correct and complete?
      placeholder: |
        - [ ] All existing tests still pass (no behavior change)
        - [ ] No file exceeds 500 lines
        - [ ] No function exceeds 50 lines
        - [ ] New unit tests cover extracted modules
        - [ ] Code review confirms improved separation of concerns
    validations:
      required: true

  - type: dropdown
    id: risk_level
    attributes:
      label: Risk Level
      description: How risky is this refactoring?
      options:
        - Low (renaming, file splitting, no logic changes)
        - Medium (extracting modules, changing interfaces)
        - High (architectural changes, database schema changes)
    validations:
      required: true
