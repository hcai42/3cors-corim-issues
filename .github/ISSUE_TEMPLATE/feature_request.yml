name: Feature Request
description: Propose a new feature or enhancement for CorIM Builder
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new feature or improvement? Please describe it below so we can understand the need and plan the implementation.

        > All code changes are implemented in [hcai42/3cors-corim](https://github.com/hcai42/3cors-corim), not in this repository.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why is it needed?
      placeholder: "Currently, compliance officers have to manually export assessment data to Excel for reporting. This is time-consuming and error-prone."
    validations:
      required: true

  - type: textarea
    id: user_story
    attributes:
      label: User Story
      description: Who benefits from this feature and how?
      placeholder: "As a compliance officer, I want to generate PDF reports directly from the assessment view so that I can share results with auditors without manual data handling."
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: How do you envision this feature working? Describe the user flow or behavior.
      placeholder: |
        1. User opens an assessment
        2. Clicks 'Export as PDF' button in the toolbar
        3. A PDF with all assessment data, risk scores, and recommendations is generated
        4. PDF downloads automatically
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: Specific functional or technical requirements. What is in scope, what is not?
      placeholder: |
        In scope:
        - PDF export with company branding
        - Include all assessment sections and risk matrix

        Out of scope:
        - Excel export (separate issue)
        - Batch export of multiple assessments

  - type: dropdown
    id: component
    attributes:
      label: Primary Component
      options:
        - Frontend (UI / React)
        - Backend (API / Python)
        - Database (Schema / Queries)
        - Infrastructure (Docker / Deployment)
        - Full Stack (Frontend + Backend)
        - Other
    validations:
      required: true

  - type: textarea
    id: affected_files
    attributes:
      label: Affected Files / Components (if known)
      description: If you know which parts of the codebase are involved, list them here.
      placeholder: |
        - 3cors-corim/frontend/shell/src/views/AssessmentDetail.tsx (add export button)
        - 3cors-corim/backend/app/routes/reports.py (new endpoint)

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: A checklist of conditions that confirm the feature is complete and working.
      placeholder: |
        - [ ] Export button is visible on the assessment detail page
        - [ ] PDF contains all assessment sections
        - [ ] PDF renders correctly in Chrome, Firefox, and Safari
        - [ ] Endpoint is protected by authentication
        - [ ] Tests cover the new functionality
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Examples / References
      description: Attach mockups, wireframes, or link to examples that illustrate the desired result.
