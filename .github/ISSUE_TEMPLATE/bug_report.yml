name: Bug Report
description: Report a bug in CorIM Builder
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below as completely as possible — the more detail you provide, the faster the issue can be resolved.

        > All fixes are implemented in [hcai42/3cors-corim](https://github.com/hcai42/3cors-corim), not in this repository.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: "When I click 'Save' on the compliance form, the page shows a spinner that never stops, and the data is not saved."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior. Be as specific as possible.
      placeholder: |
        1. Log in as a compliance officer
        2. Navigate to 'CorIM Builder > New Assessment'
        3. Fill in all required fields
        4. Click 'Save'
        5. Observe: spinner appears and never resolves
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
      placeholder: "The form should save successfully and redirect to the assessment overview with a confirmation message."
    validations:
      required: true

  - type: textarea
    id: error_output
    attributes:
      label: Error Messages / Logs
      description: Paste any error messages from the browser console, network tab, or server logs. Use code blocks for readability.
      placeholder: |
        ```
        POST /api/assessments 500 Internal Server Error
        {"detail": "column 'risk_score' cannot be null"}
        ```

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - Frontend (UI / React)
        - Backend (API / Python)
        - Database (Schema / Queries)
        - Infrastructure (Docker / Deployment)
        - Other / Unknown
    validations:
      required: true

  - type: textarea
    id: affected_files
    attributes:
      label: Affected Files / Components (if known)
      description: If you know which files or modules are involved, list them here. This significantly speeds up the fix.
      placeholder: |
        - 3cors-corim/frontend/shell/src/components/AssessmentForm.tsx
        - 3cors-corim/backend/app/routes/assessments.py

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, or deployment info if relevant.
      placeholder: |
        - Browser: Chrome 124 on Windows 11
        - Deployment: Docker (production)
        - URL: https://corimd.hcai42.com

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance Criteria
      description: How can we verify the fix is correct? A checklist of conditions.
      placeholder: |
        - [ ] The form saves successfully without errors
        - [ ] The data appears correctly in the assessment overview
        - [ ] Existing tests still pass
        - [ ] A new test covers this regression
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Recordings
      description: If applicable, add screenshots or screen recordings to illustrate the problem.
